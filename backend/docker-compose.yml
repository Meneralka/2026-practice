########################################################################
# document-service local dev environment
#
# Brings up: Postgres, Kafka (KRaft, no Zookeeper), object storage
# (RustFS by default, MinIO as a swappable fallback), and ClamAV.
#
# Usage:
#   cp .env.example .env      # first time only
#   docker compose up -d
#   docker compose ps
#
# The document-service app itself runs as the "app" service below,
# built from ./document-service/Dockerfile. It reaches the other
# services via their container hostnames on the internal network.
########################################################################

name: document-service

networks:
  document-service-net:
    name: document-service-net

volumes:
  postgres-data:
  kafka-data:
  rustfs-data:
  minio-data:
  clamav-data:

services:
  # ---------------------------------------------------------------------
  # document-service application
  # ---------------------------------------------------------------------
  app:
    build:
      context: ./document-service
    container_name: document-service-app
    restart: unless-stopped
    networks:
      - document-service-net
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-documentservice}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: document-service-postgres
    restart: unless-stopped
    networks:
      - document-service-net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-documentservice}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-documentservice}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------
  # Kafka - KRaft mode (broker + controller combined, single node).
  # No Zookeeper required. Two listeners:
  #   - PLAINTEXT       (internal, for other containers)   -> kafka:29092
  #   - PLAINTEXT_HOST  (external, for the host)            -> localhost:9092
  # ---------------------------------------------------------------------
  kafka:
    image: apache/kafka:latest
    container_name: document-service-kafka
    restart: unless-stopped
    networks:
      - document-service-net
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://:${KAFKA_INTERNAL_PORT:-29092},CONTROLLER://:19093,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:19093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MzVkNzEyOTMtOTk5OS00ZTli}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------
  # Kafka UI - web console for browsing topics, messages, consumer
  # groups and brokers. Points at Kafka's internal listener.
  # ---------------------------------------------------------------------
  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: document-service-kafka-ui
    restart: unless-stopped
    networks:
      - document-service-net
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:${KAFKA_INTERNAL_PORT:-29092}"
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # Object storage - RustFS (default / under evaluation, see
  # backend/tasks item 3). Apache-2.0, S3-compatible.
  # Activated by default via COMPOSE_PROFILES=rustfs in .env.
  # ---------------------------------------------------------------------
  rustfs:
    image: rustfs/rustfs:latest
    container_name: document-service-rustfs
    restart: unless-stopped
    profiles: ["rustfs"]
    networks:
      - document-service-net
    ports:
      - "${OBJECT_STORAGE_API_PORT:-9000}:9000"
      - "${OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ROOT_USER:-devadmin}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_ROOT_PASSWORD:-devadmin123}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------
  # Object storage - MinIO (fallback). Enable instead of RustFS by
  # setting COMPOSE_PROFILES=minio in .env, e.g. if the RustFS
  # evaluation (versioning / presigned URLs / object-lock immutability)
  # comes back negative.
  # ---------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: document-service-minio
    restart: unless-stopped
    profiles: ["minio"]
    networks:
      - document-service-net
    command: server /data --console-address ":9001"
    ports:
      - "${OBJECT_STORAGE_API_PORT:-9000}:9000"
      - "${OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ROOT_USER:-devadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_ROOT_PASSWORD:-devadmin123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------
  # ClamAV
  # ---------------------------------------------------------------------
  clamav:
    image: clamav/clamav:latest
    container_name: document-service-clamav
    restart: unless-stopped
    networks:
      - document-service-net
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
