name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test-analyze:
    name: Build, test, static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/document-service
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/documentservice
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: documentservice
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B -ntp compile

      - name: Test
        run: mvn -B -ntp test

      - name: Static analysis (Checkstyle + SpotBugs)
        run: mvn -B -ntp checkstyle:check spotbugs:check

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/document-service/target/surefire-reports
          if-no-files-found: ignore
